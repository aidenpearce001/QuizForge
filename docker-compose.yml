services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quizforge
      POSTGRES_PASSWORD: quizforge
      POSTGRES_DB: quizforge
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "0.0.0.0:8100:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://quizforge:quizforge@db:5432/quizforge
      - FRONTEND_URL=http://217.216.111.217:3000
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - backend

volumes:
  pgdata:
