services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quizforge
      POSTGRES_PASSWORD: quizforge
      POSTGRES_DB: quizforge
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
